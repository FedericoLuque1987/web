<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar Reserva - GymPro</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <header class="main-header">
        <h1>GymPro</h1>
    </header>

    <main class="container">

        <h2>Actualizar Reserva</h2>
        <p>Introduce el identificador de la reserva y los nuevos datos.</p>

        <form method="POST" action="/reservas/actualizar">

            <div class="form-group">
                <label for="id">ID de la reserva:</label>
                <input type="number" id="id" name="id" placeholder="ID de la reserva" required>
            </div>

            <div class="form-group">
                <label for="fecha">Nueva fecha:</label>
                <input type="text" id="fecha" name="fecha" placeholder="Nueva fecha" required>
            </div>

            <div class="form-group">
                <label for="tipo">Nuevo tipo de reserva:</label>
                <input type="text" id="tipo" name="tipo" placeholder="Nuevo tipo de reserva" required>
            </div>

            <div class="form-group">
                <label for="unidades">Unidades:</label>
                <input type="number" id="unidades" name="unidades" placeholder="Unidades" required>
            </div>

            <div class="form-group">
                <label for="precio">Precio:</label>
                <input type="number" step="0.01" id="precio" name="precio" placeholder="Precio" required>
            </div>

            <div class="form-buttons">
                <button type="submit" class="btn btn-primary">Actualizar reserva</button>
            </div>

        </form>

        <p style="margin-top: 1rem;">
            <a href="/reservas">Ver mis reservas</a> |
            <a href="/eliminar.html">Eliminar una reserva</a>
        </p>

    </main>

</body>
</html>
